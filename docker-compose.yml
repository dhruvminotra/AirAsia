services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pubsub-emulator:
    image: google/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --project=test-project --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  low-fare-calendar:
    build: .
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_CLOUD_GCP_PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - SPRING_CLOUD_GCP_PUBSUB_PROJECT_ID=test-project
    depends_on:
      redis:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
