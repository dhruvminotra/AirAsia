spring:
  application:
    name: low-fare-calendar
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 200ms
      lettuce:
        pool:
          enabled: true
          max-active: 64
          max-idle: 32
          min-idle: 8
  cloud:
    gcp:
      project-id: ${SPRING_CLOUD_GCP_PUBSUB_PROJECT_ID:test-project}
      pubsub:
        emulator-host: ${SPRING_CLOUD_GCP_PUBSUB_EMULATOR_HOST:localhost:8085}

server:
  port: 8080

calendar:
  base-currency: MYR
  provider-timeout-millis: 450
  cache:
    ttl-seconds: 86400
    ttl-jitter-seconds: 3600
    empty-ttl-seconds: 300
  pubsub:
    sold-out-topic: price-class-sold-out
    sold-out-subscription: sold-out-sub
  warming:
    enabled: true
    months-ahead: 1
    routes:
      - KUL-SIN
      - KUL-BKK
      - KUL-DMK
  exchange-rates:
    MYR: 1.0
    USD: 0.21
    THB: 7.60
    SGD: 0.29
    IDR: 3450.0

providers:
  settings:
    sabre:
      min-latency-millis: 20
      max-latency-millis: 120
      failure-rate: 0.02
    amadeus:
      min-latency-millis: 30
      max-latency-millis: 150
      failure-rate: 0.05
    galileo:
      min-latency-millis: 25
      max-latency-millis: 140
      failure-rate: 0.03

resilience4j:
  circuitbreaker:
    configs:
      provider:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 4
        minimum-number-of-calls: 8
    instances:
      sabre:
        base-config: provider
      amadeus:
        base-config: provider
      galileo:
        base-config: provider
  timelimiter:
    configs:
      provider:
        timeout-duration: 400ms
    instances:
      sabre:
        base-config: provider
      amadeus:
        base-config: provider
      galileo:
        base-config: provider

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    tags:
      application: low-fare-calendar
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.airasia.flight: INFO
